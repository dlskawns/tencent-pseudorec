    measurable: "Δ ∈ [+0.001, +0.003pt] OOF → additive 약 effect, sub-H 가치"
    noise: "Δ ∈ (−0.001, +0.001pt] OOF → KLD MSE redundant or λ too small"
    degraded: "Δ < −0.001pt OOF → KLD BCE 와 fight, λ↓ 또는 retire"
  secondary:

mutation:
  class: output_distribution_supervision   # axis = loss-objective output-level
  type: loss_term_addition
  description: |
    H038 base (BCE main + MSE aux on log1p(timestamp)) 위에 per-sample
    Bernoulli KL(σ(logit) ‖ Bern(prior=0.124)) term 추가.
    loss += λ_kld · mean_i KL(Bern(σ(logit_i)) ‖ Bern(0.124))
    λ_kld=0.01 (보수적, KLD/BCE 비율 ~1%).
    kld_lambda=0 시 H038 byte-identical (safe carrier).
  single_mutation_compliance: |
    §17.2 — KLD term 단일 추가. trainer.py loss branch 만 변경,
    model graph / data path / infer 전부 byte-identical to H038.


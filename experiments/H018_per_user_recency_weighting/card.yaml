# H018 — Experiment Card
# Generated 2026-05-03. PRD-driven scaffold (Ralph mode US-007).

hypothesis_id: H018_per_user_recency_weighting
control_exp_id: H015_recency_loss_weighting   # paired Δ primary
secondary_control: H010_ns_to_s_xattn         # anchor (corrected 0.837806)

mutation:
  class: temporal_cohort                      # primary_category (4th sibling)
  type: granularity_change
  description: |
    Replace H015 per-batch linear recency weighting [0.5, 1.5] (by
    label_time percentile) with per-user exp time-decay weighting
    weight = exp(-days_since_last_event / tau=14), per-batch normalize
    mean=1.0, clip [0.1, 3.0]. Mechanism stack (NS xattn + DCN-V2)
    byte-identical.
  single_mutation_compliance: |
    §17.2 — granularity change (per-batch → per-user) is the single
    mutation. exp form is carry-forward of H017 sub-spec within same
    mechanism class (recency loss weighting). See challengers.md ④
    for multi-mutation concern + justification.

carry_forward:
  - H015: mechanism class (recency loss weighting), per-batch normalize mean=1.0
  - H016: OOF redefine future-only (default `--oof_redefine future_only`)
  - H010: NS xattn + DCN-V2 stack byte-identical
  - §18.7: label_time fill_null + zero_copy_only=False
  - §18.8: emit_train_summary() at end of train.py (FIRST H to use)

compute_tier: T2.4
expected_runtime_h: 3.5
cost_estimate_usd: 5.0
cost_cap_usd: 5.0                             # §17.6 per-job cap
cumulative_cost_h_estimate: 44.0              # H006-H017 ~40h + H018 ~4h

success_criterion:
  primary: "Δ vs H015 corrected platform AUC ≥ +0.005pt"
  binary_classifications:
    strong: "Δ ≥ +0.005pt → mechanism class confirmed, anchor candidate"
    measurable: "Δ ∈ [+0.001, +0.005pt] → per-user 약 effect, mechanism class retire 권고"
    noise: "Δ ∈ [−0.001, +0.001pt] → granularity REFUTED, mechanism class retire"
    degraded: "Δ < −0.001pt → per-user variance disrupt, mechanism class retire"
  secondary:
    val_platform_gap: "≤ +0.01pt (P5)"
    oof_platform_gap_redefined: "≤ +0.01pt (P6)"
    overfit_gap: "≤ +0.005pt (best_val − last_val)"

ckpt_export: best                             # §18.8 ckpt_exported field

falsification:
  primary_claim: |
    Per-user exp time-decay weighting yields corrected platform AUC
    Δ ≥ +0.005pt vs H015 (per-batch linear baseline). If false, recency
    mechanism class fails the cohort drift attack at finer granularity →
    paradigm shift mandatory.
  decision_tree_post_result:
    strong:
      - anchor = H018
      - H019 = tau sweep (7, 30) sub-H or per-user × per-batch hybrid sub-H
    measurable:
      - retire mechanism class
      - H019 = paradigm shift (TWIN retrieval / OneTrans), forced rotation away from temporal_cohort
    noise:
      - REFUTED — retire mechanism class
      - H019 mandatory paradigm shift, cost cap audit (T3 feasibility check)
    degraded:
      - REFUTED — variance disrupt
      - H018-sub = clip [0.5, 1.5] tight or tau=30 smoother, OR retire and paradigm shift


hypothesis_id: H032_timestamp_input_features
control_exp_id: H023_variance_baseline_redo  # bce explicit, batch=1024 (current methodology baseline)
secondary_control: H010_ns_to_s_xattn        # corrected anchor (Platform 0.837806)

mutation:
  class: temporal_input
  type: input_axis_temporal_features
  description: |
    timestamp 에서 derived 한 3 categorical features (hour_of_day=24,
    day_of_week=7, recency_bucket from log2(timestamp - max_seq_ts)=8)
    각각 16-dim embedding → sum → LayerNorm → Linear → d_model NS-token
    1개 추가. DCN-V2 입력 NS-token list 에 합류. H010 backbone 외 모두
    byte-identical.

    H015~H018 의 recency 시도 (loss reweight axis) 와 다른 axis (input
    feature axis) — model forward 가 per-sample temporal context 직접
    학습.
  single_mutation_compliance: |
    §17.2: 1 mutation = "timestamp-derived 3 categorical features 를 1
    NS-token 으로 합류". NS xattn / DCN-V2 / TransformerEncoder / seq
    encoder 변경 없음. anchor 입력 byte-identical 외 시간 derived only
    추가 (H010 safe stacking 패턴).

carry_forward:
  - H010: NS xattn + DCN-V2 byte-identical (anchor)
  - H023: bce explicit, batch=1024 (OOM safety regime)
  - §18.7: label_time fill_null + (NEW) timestamp fill_null(0)
  - §18.8: emit_train_summary

compute_tier: T2.4
expected_runtime_h: 3.5
cost_estimate_usd: 5.0
cost_cap_usd: 7.0

success_criterion:
  primary: "Δ vs control platform AUC"
  binary_classifications:
    strong_pass: "Δ ≥ +0.005pt → temporal input signal 기존 trunk 로 못 잡던 정보 capture"
    measurable_pass: "Δ ∈ [+0.001, +0.005pt] → marginal, sub-H (week_of_year, multi-resolution) 정당화"
    noise: "Δ ∈ (−0.001, +0.001pt) → seq 내부 time bucketing 으로 implicit 충분, input-axis temporal retire"
    degraded: "Δ < −0.001pt → cohort overfit (H011 패턴), retract"

ckpt_export: best
rotation_audit:
  primary_category: temporal_input
  rotation_status: FIRST_TOUCH  # H015~H018 은 모두 temporal_loss (loss-axis), H032 는 input-axis
  prior_h_categories:
    - H028: measurement
    - H029: measurement
    - H030: measurement
  re_entry_justification: |
    temporal_input 카테고리 첫 진입. H015~H018 은 temporal_loss
    (loss reweight axis) 로 다른 카테고리. §10.7 FREE.


mutation:
  class: retrieval_long_seq                    # primary_category (re-entry from H019/H020, 3회 연속)
  type: hyperparam_policy_refinement           # not class addition / not module change — top_k policy uniform → domain-aware
  description: |
    TWINBlock 의 top_k 를 도메인별로 다르게 instantiate.
    `{a:64, b:64, c:64, d:96}` — domain d 만 50% 확장.
    §3.5 quantitative motivation: domain d p90=2215 = K=64 의 top 2.9% (4 도메인 중 가장 under-served).
    K=128 uniform sweep flat 영역의 75% conservative end.
    TWINBlock class byte-identical to H019 (이미 top_k 를 init param 으로 받음).
    PCVRHyFormer wiring + train.py argparse + run.sh 만 변경.
  single_mutation_compliance: |
    §17.2 — top_k policy 의 uniform → domain-aware 단일 변경. TWINBlock 내부
    code 변경 0. ESU MultiheadAttention / GSU inner product / aggregator /
    gate / num_heads / seq_max_lens 256/256/256/256 / batch 1024 / NS xattn /
    DCN-V2 stack 전부 H019 byte-identical. trainable params 추가 0.

carry_forward:
  - H019: TWIN module + GSU + ESU + aggregator + gate=-2.0 + num_heads=4 byte-identical
  - H010: NS xattn + DCN-V2 stack byte-identical (carry-forward through H019)
  - §18.7: label_time fill_null + zero_copy_only=False (H015 carry, dataset.py 변경 없음)
  - §18.8: emit_train_summary() at end of train.py (H019 carry, exp_id 만 변경)
  - H016: redefined OOF default (--oof_redefine future_only)
  - seq_max_lens 256/256/256/256 H019 carry (sweep saturation 영역)


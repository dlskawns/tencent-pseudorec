success_criterion:
  primary: "Δ vs H019 (cloud actual 0.839674) platform AUC ≥ +0.003pt"
  binary_classifications:
    strong: "Δ ≥ +0.003pt → per-domain K lift, anchor = H021 (or H020 if H020 더 큼), H022 = 정량안 (a:96 d:128) sub-H"
    measurable: "Δ ∈ [+0.001, +0.003pt] → 약 effect, H020 결과와 paired stack 가능성"
    noise: "Δ ∈ (−0.001, +0.001pt] → uniform K=64 globally saturated, retrieval quantity axis dead → ESU(A3) 또는 cohort(C)"
    degraded: "Δ < −0.001pt → K=96 noise injection 또는 inter-domain instability, sub-H K=80 또는 retire"
  secondary:
    delta_vs_h010: "Δ vs H010 corrected (0.837806) = +0.00187 + H021 Δ. ≥ +0.005pt → retrieval class 영구 confirm"
    delta_vs_h020: "Δ vs H020 (cloud actual TBD) = paired axis comparison. H021 > H020 → quantity axis dominant. H020 > H021 → scoring axis dominant. 둘 다 PASS → H022 stack."
    val_platform_gap: "≤ +0.01pt (P5, F-A baseline mean −0.003pt)"
    oof_platform_gap_redefined: "≤ +0.01pt (P6, H016 baseline −0.004pt)"
    overfit_gap: "≤ +0.005pt (best_val − last_val)"
    cost_cap: "actual ≤ $10 (P7, T2.4 per-run cap)"

ckpt_export: best                              # §18.8 ckpt_exported field

falsification:
  primary_claim: |
    TWIN top_k policy 의 uniform=64 → per-domain {a:64, b:64, c:64, d:96}
    (domain d 만 50% 확장) 가 H019 anchor 위 Δ ≥ +0.003pt 추가 lift 만든다.
    만약 거짓 → uniform K=64 가 모든 도메인에서 effective limit (Frame A 또는
    B confirmed) → retrieval class 의 quantity axis dead. ESU capacity (A3)
    또는 cohort drift (C) pivot.
  decision_tree_post_result:
    strong:
      - anchor = H021 (or H020 if H020 더 큼)
      - H022 = 정량안 (a:96 d:128) sub-H — H021 PASS 결과 후 더 공격적 K 확장 검증
      - retrieval quantity axis 영구 confirm
      - H020 도 PASS 면 H023 = stack (H020 + H021 동시 mutation)
    measurable:
      - quantity axis 약 effect
      - H020 결과와 paired 비교 → 둘 다 measurable+ 면 H022 = stack
      - H021 only measurable+ 면 H021 anchor + H022 = 정량안
    noise:
      - quantity axis NOOP (Frame A confirmed)
      - retrieval class 의 quantity axis dead — uniform + per-domain 모두 saturation
      - H020 결과와 paired: H020 도 noise 면 retrieval class 전체 saturation → ESU(A3) 또는 cohort(C)
    degraded:
      - K=96 too aggressive (Frame B 또는 C confirmed)
      - sub-H 후보:
        - K=80 (gentle expansion)
        - 다른 도메인 (a:96 b:64 c:64 d:64) test
        - per-domain LayerNorm rescale (Frame C confirmed 시)
      - 모든 sub-H 실패 시 retire


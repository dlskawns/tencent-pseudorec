id: E000
hypothesis_id: H001_unified_baseline_full
slug: unified_baseline_demo
status: pending
compute_tier: T1.2
claim_scope: "demo-only; generalizability TBD until full-data arrives"

control: null   # anchor 자체 — control 없음
treatment: "organizer PCVRHyFormer baseline + competition/run.sh defaults + label_time split + OOF holdout"

config:
  data_dir: data/
  schema_path: data/schema.json   # generated by make_schema.py
  ns_tokenizer_type: rankmixer
  user_ns_tokens: 5
  item_ns_tokens: 2
  num_queries: 2
  num_hyformer_blocks: 2
  num_heads: 4
  d_model: 64
  emb_dim: 64
  seq_encoder_type: transformer
  hidden_mult: 4
  dropout_rate: 0.01
  use_time_buckets: true
  rank_mixer_mode: full
  loss_type: bce          # baseline = BCE (focal는 후속 H에서)
  lr: 1.0e-4
  sparse_lr: 0.05
  batch_size: 256
  num_epochs: 8           # demo_1000 작아서 실제로 early stopping이 결정
  patience: 5
  seed: 42
  use_label_time_split: true
  oof_user_ratio: 0.1
  emb_skip_threshold: 1000000
  num_workers: 0          # MPS / CPU sample run, 단일 worker

run_command: bash experiments/E000_unified_baseline_demo/run.sh
metrics_target_path: experiments/E000_unified_baseline_demo/metrics.json
expected_wall_min: 30

falsification:
  P1: train NaN abort or non-finite best_val_AUC
  P2: predictions stdev < 0.01 across users
  P3: |train_AUC - valid_AUC| < 0.05  (overfit absent ⇒ pipeline suspect)
  P4: any G1–G6 fail
  P5: OOF AUC < 0.50

repro_meta:
  seed: 42
  python: 3.11
  venv: .venv-arm64
  config_sha256: TBD   # filled by run.sh after first execute

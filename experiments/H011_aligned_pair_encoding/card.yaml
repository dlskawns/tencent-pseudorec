      Test 1 (Pattern X dense max=18M): finite, |out|.max=2.34
      Test 2 (Pattern Y dense [-1,+1]): finite, |out|.max=3.32
      Test 3 (baseline dense=None): finite
      Test 4 (uniform weights ≡ baseline): diff=4e-7 PASS
      Test 5 (zero-row safety, clamp 1e-8): finite
      Param-free: 7680 params before/after

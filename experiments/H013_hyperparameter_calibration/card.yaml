  - syntax: "ast.parse OK for model.py / train.py / infer.py / trainer.py / dataset.py"
  - mechanism_unchanged: "model.py byte-identical with H010 (sha256 검증 가능)"
  - run_sh_diff: "4 hyperparameter changes vs H010/upload/run.sh"

success_criterion:
  primary: "Δ vs H019 (cloud actual 0.839674) platform AUC ≥ +0.003pt"
  binary_classifications:
    strong: "Δ ≥ +0.003pt → learnable scoring lift, anchor = H020, H021 = per-domain top_k stack"
    measurable: "Δ ∈ [+0.001, +0.003pt] → 약 effect, A2 stack 가능성 검증"
    noise: "Δ ∈ (−0.001, +0.001pt] → scoring NOOP, retrieval selection axis retire → H022′ ESU(A3) 또는 cohort(C)"
    degraded: "Δ < −0.001pt → projection rank reduction issue, sub-H = dim 확장 또는 retire"
  secondary:
    delta_vs_h010: "Δ vs H010 corrected (0.837806) = +0.001868 (H019 cloud actual) + H020 Δ. ≥ +0.005pt → retrieval class 영구 confirm"
    val_platform_gap: "≤ +0.01pt (P5, F-A baseline mean −0.003pt)"
    oof_platform_gap_redefined: "≤ +0.01pt (P6, H016 baseline −0.004pt)"
    overfit_gap: "≤ +0.005pt (best_val − last_val)"
    cost_cap: "actual ≤ $10 (P7, T2.4 per-run cap)"

ckpt_export: best                               # §18.8 ckpt_exported field

falsification:
  primary_claim: |
    TWIN GSU 의 parameter-free inner product → learnable projection
    (W_q, W_k: nn.Linear(d_model, d_model//4, bias=False)) 가 H019 anchor 위
    Δ ≥ +0.003pt 추가 lift 만든다. 만약 거짓 → backbone embedding space 가
    이미 retrieval scoring 에 충분 → retrieval class 의 selection policy axis
    retire. H022′ = ESU capacity (A3) 또는 cohort drift attack (C) pivot.
  decision_tree_post_result:
    strong:
      - anchor = H020
      - H021 = per-domain top_k stack on H020 base (보수안 a:64 b:64 c:32 d:96)
      - retrieval scoring axis 영구 confirm
    measurable:
      - scoring 약 effect
      - H021 = per-domain top_k 단독 (on H019 base)
      - H020 vs H021 paired 비교 후 stack 결정
    noise:
      - scoring 무 effect (Frame A confirmed)
      - retrieval selection axis retire
      - H022′ = ESU 2-layer (A3) 또는 cohort drift (C)
    degraded:
      - projection rank reduction (Frame B confirmed)
      - sub-H = projection dim d_model//2 (= 32)
      - 또는 W_k only (W_q identity) — params 절반
      - 또는 retire (학습 instability)


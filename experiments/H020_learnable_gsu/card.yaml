hypothesis_id: H020_learnable_gsu
control_exp_id: H019_twin_long_seq_retrieval   # paired Δ primary
secondary_control: H010_ns_to_s_xattn           # corrected anchor 0.837806 (carry-forward signal)

mutation:
  class: retrieval_long_seq                     # primary_category (re-entry from H019)
  type: mechanism_internal_refinement           # not class addition — sub-H scoring function refinement
  description: |
    TWINBlock GSU 의 parameter-free inner product → learnable projection.
    `nn.Linear(d_model, d_model // 4, bias=False)` 1쌍 추가 (W_q on
    candidate, W_k on history). score = (W_q·candidate) · (W_k·history).
    paper-faithful GSU 직접 검증 (H019 simplified form 의 다음 깊이).
    ESU / top_k=64 / aggregator / gate=-2.0 / num_heads=4 byte-identical to H019.
  single_mutation_compliance: |
    §17.2 — GSU scoring function 의 parameter-free → learnable projection 단일
    변경. ESU MultiheadAttention / top_k filter / aggregator / gate / num_heads
    / seq_max_lens 256/256/256/256 / batch 1024 / NS xattn / DCN-V2 stack 전부
    H019 byte-identical.

carry_forward:
  - H019: TWIN module + ESU + aggregator + gate=-2.0 + top_k=64 byte-identical
  - H010: NS xattn + DCN-V2 stack byte-identical (carry-forward through H019)
  - §18.7: label_time fill_null + zero_copy_only=False (H015 carry, dataset.py 변경 없음)
  - §18.8: emit_train_summary() at end of train.py (H019 carry, exp_id 만 변경)
  - H016: redefined OOF default (--oof_redefine future_only)
  - seq_max_lens 256/256/256/256 H019 carry (sweep saturation 확인 후 best 영역)


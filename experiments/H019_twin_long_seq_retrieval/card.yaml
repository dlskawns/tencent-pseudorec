# H019 — Experiment Card
# Generated 2026-05-03. PRD-driven scaffold (Ralph mode US-005).
# CONDITIONAL: launch decision depends on H018 outcome.

hypothesis_id: H019_twin_long_seq_retrieval
control_exp_id: H010_ns_to_s_xattn        # paired Δ primary vs corrected anchor
secondary_control: H015_recency_loss_weighting   # H015 corrected for retrieval-vs-recency comparison

mutation:
  class: retrieval_long_seq                # primary_category (NEW first-touch)
  type: mechanism_class_addition
  description: |
    TWIN (Tencent 2024 RecSys) GSU+ESU per-domain retrieval module.
    GSU = simple inner product (parameter-free) → top-K=64. ESU =
    standard MultiHeadAttention(num_heads=4). Applied per-domain
    (a/b/c/d) before existing self-attention encoder. seq_max_lens
    expanded 64-128 → 512 cap to make retrieval meaningful.
  single_mutation_compliance: |
    §17.2 — TWIN module addition is the single mechanism class change.
    NS xattn / DCN-V2 stack byte-identical. seq_max_lens expansion is
    coupled (retrieval requires capacity to retrieve from) — counted as
    same mutation per challengers.md.

carry_forward:
  - H010: NS xattn + DCN-V2 stack byte-identical
  - §18.7: label_time fill_null + zero_copy_only=False
  - §18.8: emit_train_summary() at end of train.py (second H to use)
  - H016: redefined OOF default (--oof_redefine future_only)

compute_tier: T3                           # Lambda/RunPod on-demand
expected_runtime_h: 6
cost_estimate_usd: 15.0                    # T3 per-job cap
cost_cap_usd: 12.0                         # §17.6 T3 per-run cap (warn at $12, abort at $15)
cumulative_cost_h_estimate: 56.0           # H006-H018 ~50h + H019 ~6h
cumulative_cost_usd_estimate: TBD          # Taiji 가격 unknown, T3 추가 ~$15
campaign_cost_cap_usd: 100.0               # §17.6 per-campaign

success_criterion:
  primary: "Δ vs H010 corrected (0.837806) platform AUC ≥ +0.005pt"
  binary_classifications:
    strong: "Δ ≥ +0.005pt → retrieval mechanism class confirmed, anchor = H019"
    measurable: "Δ ∈ [+0.001, +0.005pt] → retrieval 약 effect, sub-H 후보"
    noise: "Δ ∈ [−0.001, +0.001pt] → retrieval 도 cohort hard ceiling 못 풂, H020 보류"
    degraded: "Δ < −0.001pt → TWIN 구현 issue, sub-H 또는 retire"
  secondary:
    val_platform_gap: "≤ +0.01pt (P5, F-A baseline mean −0.003pt)"
    oof_platform_gap_redefined: "≤ +0.01pt (P6, H016 baseline −0.004pt)"
    overfit_gap: "≤ +0.005pt (best_val − last_val)"
    cost_cap: "actual ≤ $15 (P7)"

ckpt_export: best                         # §18.8 ckpt_exported field

falsification:
  primary_claim: |
    TWIN GSU+ESU per-domain retrieval (top-K=64 from cap=512) yields
    corrected platform AUC Δ ≥ +0.005pt vs H010 anchor (0.837806). If
    false, retrieval form fails the cohort drift attack → cohort hard
    ceiling hypothesis strong confirm → H020 paradigm shift 다른 form
    보류 결정.
  decision_tree_post_result:
    strong:
      - anchor = H019
      - H020 = TWIN sub-H (top-K sweep 32/128/256, learnable GSU variant)
      - retrieval mechanism class 영구 confirm
    measurable:
      - retrieval 약 effect
      - H020 = sub-H (top-K variant 또는 SIM original form)
    noise:
      - retrieval 도 ceiling 못 풂 → cohort hard ceiling 강한 confirm
      - H020 보류 (cost cap audit 후 ensemble / multi-seed measurement H pivot)
      - paradigm shift class 추가 시도 보류
    degraded:
      - TWIN 구현 issue
      - sub-H = top-K=128 or ESU 단순화 또는 retire


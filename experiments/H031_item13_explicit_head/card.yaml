    - "All 21 params have non-zero grad with pow(2).sum() loss ✅"
    - "Gate sigmoid(-2.0) = 0.1192 ✅"
    - "Per-row variation: different i13 → different cross_state, uniform input → identical ✅"
    - "Full PCVRHyFormer instantiation: 161,018,130 total params, 85,137 cross block (0.053%) ✅"
    - "1-batch forward (B=4): shape (4, 1), finite output ✅"
    - "Ablation enabled vs disabled: max abs diff 0.139 → cross contributes ✅"
  files_modified:

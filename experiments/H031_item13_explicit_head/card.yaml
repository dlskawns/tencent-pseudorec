    post-backbone 으로 변경 (additive, anchor 입력 byte-identical 유지). 새
    Item13UserCrossBlock 추가 → output += sigmoid(gate) * cross_state.
    gate init = sigmoid(-2.0) ≈ 0.1192 (§10.10 InterFormer mandate).
    num_ns 변경 없음 → d_model % T 제약 안전.
  t0_sanity_results:

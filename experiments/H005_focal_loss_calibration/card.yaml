id: H005_focal_loss_calibration
hypothesis_id: H005_focal_loss_calibration
slug: focal_loss_calibration
status: scaffold
compute_tier: T2.4 (Taiji platform, ~3min smoke)
claim_scope: "BCE → focal(α=0.25, γ=2.0). PCVRHyFormer-anchor 위 첫 mutation. §17.4 rotation 첫 충족 (loss_calibration), §17.2 깔끔 (CLI flag만)."

control: E_baseline_organizer (val_AUC=0.8251)
treatment: |
  같은 organizer-pure baseline (row-group split, no OOF, train_ratio=0.05,
  seq_max_lens halved, num_epochs=1, NS=5+2=7, num_queries=2) PLUS
  loss BCE → focal(α=0.25, γ=2.0). Lin et al. ICCV 2017 표준.
  코드 변경 0 (PCVRHyFormer 가 focal 이미 지원).

config:
  use_label_time_split: false              # organizer split (E_baseline_organizer 와 동일)
  ns_tokenizer_type: rankmixer
  user_ns_tokens: 5
  item_ns_tokens: 2
  num_queries: 2
  num_hyformer_blocks: 2
  num_heads: 4
  d_model: 64
  emb_dim: 64
  seq_encoder_type: transformer
  hidden_mult: 4
  dropout_rate: 0.01
  use_time_buckets: true
  rank_mixer_mode: full
  loss_type: focal                         # H005 NEW (BCE → focal)
  focal_alpha: 0.25                        # H005 NEW (Lin et al. 표준)
  focal_gamma: 2.0                         # H005 NEW (Lin et al. 표준)
  lr: 1.0e-4
  sparse_lr: 0.05
  batch_size: 256
  num_epochs: 1
  patience: 5
  seed: 42
  emb_skip_threshold: 1000000
  num_workers: 2
  buffer_batches: 4
  train_ratio: 0.05
  seq_max_lens: "seq_a:64,seq_b:64,seq_c:128,seq_d:128"
  backbone: hyformer                       # PCVRHyFormer-anchor (H004 OneTrans archive-pending)

run_command: bash experiments/H005_focal_loss_calibration/upload/run.sh
metrics_target_path: TRAIN_CKPT_PATH/metrics.json
expected_wall_min: 3                        # E_baseline_organizer 와 동일 (focal overhead ≈ 0)

falsification:
  P1: NaN abort or non-finite best_val_AUC
  P2: Δ < +0.5pt val_AUC vs control (= val_AUC < 0.8301)
  P3: best_val_logloss > 0.2792 (악화 > 10% — focal 정상 동작 의심 신호)
  P4: any G1-G6 fail
  P5: not falsifying — bonus AUC vs logloss trade-off measurement

repro_meta:
  seed: 42
  python: 3.10 (Taiji)
  cuda: 12.6
  torch: 2.7.1+cu126
  config_sha256: TBD                       # filled after run
  total_param_count: TBD                   # ~198M expected (loss change adds 0 params)

mutation_class:
  axis: loss_calibration
  type: one-mutation                       # §17.2 깔끔
  rotation: first_loss_calibration         # §17.4 첫 충족 (H001/H002/H004 모두 unified_backbones)

carry_forward_from_h004:
  - F-3: PCVRHyFormer-anchor 단기 우세 (val=0.8251) — 본 H 가 paired 비교 대상.
  - F-4: NS-token expansion 후보 폐기 (T constraint) — 메모리 갱신 완료.
  - F-5: H005 = focal_loss_calibration promote — 본 H.

decision_tree_post_result:
  pass: |
    Δ ≥ +0.5pt + P3/P4 PASS → H006 = long_seq_retrieval (D 도메인 1100 tail) 또는
    target_attention. axis-strengthening 카테고리 rotation.
  weak_signal: |
    Δ ∈ [+0.0, +0.5pt) + P3/P4 PASS → focal 작동, lift 마진 부족. loss_calibration
    카테고리 일시 archive. H006 = axis-strengthening.
  break: |
    Δ < 0 → α tuning H (α=0.5 시도) 후보 또는 loss_calibration retire.

code_package_status: COMPLETE              # H004 upload base + run.sh 변경만
